name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can push back to main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Compute tarball sha256
        id: meta
        run: |
          TAG="${{ github.ref_name }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          # GitHub may take a moment to make the tarball available after tag push
          for i in 1 2 3 4 5; do
            SHA=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1) && break
            sleep 5
          done
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        run: |
          URL="${{ steps.meta.outputs.url }}"
          SHA="${{ steps.meta.outputs.sha256 }}"
          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/claude-bridge.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/claude-bridge.rb

      - name: Commit and push formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-bridge.rb
          git diff --cached --quiet && echo "Formula already up-to-date" && exit 0
          git commit -m "chore: update formula for ${{ github.ref_name }}"
          git push origin HEAD:main
